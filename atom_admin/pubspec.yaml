name: atom_admin
description: Atom Media Platform Admin Panel
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: MyanmarText
      fonts:
        - asset: assets/fonts/MyanmarText-Regular.ttf
        - asset: assets/fonts/MyanmarText-Bold.ttf
          weight: 700
